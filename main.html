<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Tracker - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="navbar bg-base-200 px-6">
    <div class="flex items-center gap-2 flex-1">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8">
      <span class="text-xl font-bold">GitHub Issues Tracker</span>
    </div>
    <div class="flex items-center gap-2">
      <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered w-64">
      <button id="searchBtn" class="btn btn-primary">Search</button>
      <button id="newIssueBtn" class="btn bg-purple-600 text-white hover:bg-purple-700">+ New Issue</button>
    </div>
  </nav>

  <!-- Tabs -->
  <div class="flex justify-center mt-6 space-x-4">
    <button id="allTab" class="tabBtn px-6 py-2 rounded-lg font-medium bg-purple-600 text-white">All</button>
    <button id="openTab" class="tabBtn px-6 py-2 rounded-lg font-medium bg-gray-200 text-gray-700">Open</button>
    <button id="closedTab" class="tabBtn px-6 py-2 rounded-lg font-medium bg-gray-200 text-gray-700">Closed</button>
  </div>

  <!-- Issues Summary Bar -->
  <div class="bg-white shadow-md rounded-lg mx-6 mt-6 p-4 flex flex-col md:flex-row md:items-center md:justify-between">
    <div class="flex items-center gap-4">
      <img src="./assets/Aperture.png" alt="Issues Icon" class="w-10 h-10">
      <div>
        <h2 id="issueCount" class="text-xl font-bold">0 Issues</h2>
        <p class="text-gray-500">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex gap-6 mt-4 md:mt-0">
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        <span class="text-sm text-gray-700">Open</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        <span class="text-sm text-gray-700">Closed</span>
      </div>
    </div>
  </div>

  <!-- Issues Grid -->
  <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-6"></div>

  <!-- Spinner -->
  <div id="spinner" class="flex justify-center mt-6 hidden">
    <span class="loading loading-spinner loading-lg text-primary"></span>
  </div>

  <!-- Modal -->
<dialog id="issueModal" class="modal">

  <div class="modal-box max-w-2xl bg-gray-100 rounded-xl p-8">

    <div id="modalContent"></div>

    <div class="flex justify-end mt-6">
      <form method="dialog">
        <button class="bg-red-400 hover:bg-red-500 text-white px-6 py-2 rounded-lg font-semibold">
          Close
        </button>
      </form>
    </div>

  </div>

</dialog>

  <script src="./main.js"></script>
</body>
</html>
