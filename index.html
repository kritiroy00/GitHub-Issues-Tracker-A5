<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="card w-96 bg-white shadow-xl p-6">
    <div class="flex flex-col items-center">
      <img src="./assets/github-logo.png" alt="Logo" class="w-16 mb-4">
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 mb-4">Sign in to manage your issues</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium">Username</label>
        <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full">
        <small class="text-purple-500">Default: admin</small>
      </div>
      <div>
        <label class="block text-sm font-medium">Password</label>
        <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full">
        <small class="text-purple-500">Default: admin123</small>
      </div>
      <button type="submit" class="btn btn-primary w-full">Sign In</button>
    </form>

    <div class="divider">OR</div>
    <p class="text-sm text-center text-gray-600">
      Demo Credentials:<br>Username: <span class="text-purple-500">admin</span><br>Password: <span class="text-purple-500">admin123</span>
    </p>
  </div>

  <script src="./login.js"></script>
</body>
</html>
